<!-- Manage Environments Modal -->
<div id="env-modal" class="modal">
    <div class="modal-content" style="max-width: 700px;">
        <div class="modal-header">
            <h2><i class="fas fa-server"></i> Manage Environments</h2>
            <button class="close-btn" onclick="closeModal('env-modal')">&times;</button>
        </div>
        <div class="modal-body">
            <!-- Add Environment Form -->
            <div style="background: linear-gradient(135deg, rgba(99, 102, 241, 0.1) 0%, rgba(139, 92, 246, 0.1) 100%); padding: 20px; border-radius: 12px; margin-bottom: 24px;">
                <h3 style="margin: 0 0 16px 0; color: var(--primary-color); display: flex; align-items: center; gap: 8px;">
                    <i class="fas fa-plus-circle"></i> Add New Environment
                </h3>
                <form id="env-form">
                    <div class="form-row">
                        <div class="form-section" style="flex: 2;">
                            <label for="env-name" class="form-label">
                                <i class="fas fa-tag"></i> Environment Name <span class="required">*</span>
                            </label>
                            <input type="text" id="env-name" class="form-control" required placeholder="e.g., Production, Staging, Development">
                        </div>
                        <div class="form-section" style="flex: 1;">
                            <label for="env-color" class="form-label">
                                <i class="fas fa-palette"></i> Color
                            </label>
                            <input type="color" id="env-color" class="form-control" value="#2563eb" style="height: 45px; cursor: pointer;">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 12px;">
                        <i class="fas fa-plus"></i> Add Environment
                    </button>
                </form>
            </div>
            
            <!-- Existing Environments -->
            <div>
                <h3 style="margin: 0 0 16px 0; color: var(--text-primary); display: flex; align-items: center; gap: 8px;">
                    <i class="fas fa-list"></i> Existing Environments
                </h3>
                <div id="env-list"></div>
            </div>
        </div>
    </div>
</div>
