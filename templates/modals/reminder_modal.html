<!-- Add Reminder Modal -->
<div id="reminder-modal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3><i class="fas fa-bell"></i> Add New Reminder</h3>
            <button class="close-modal" onclick="closeModal('reminder-modal')">&times;</button>
        </div>
        <form id="reminder-form">
            <div class="form-group">
                <label for="reminder-github-issue">🔗 Link to GitHub Issue (Optional)</label>
                <select id="reminder-github-issue" class="form-control">
                    <option value="">-- No GitHub Issue --</option>
                </select>
                <small style="color: var(--text-secondary); font-size: 12px;">Link this reminder to a GitHub issue</small>
            </div>
            
            <div class="form-group">
                <label for="reminder-title">Title *</label>
                <input type="text" id="reminder-title" class="form-control" required placeholder="Enter reminder title">
            </div>
            
            <div class="form-group">
                <label for="reminder-description">Description</label>
                <textarea id="reminder-description" class="form-control" rows="3" placeholder="Add reminder description..."></textarea>
            </div>
            
            <div class="form-group">
                <label for="reminder-time">⏰ Reminder Time *</label>
                <input type="datetime-local" id="reminder-time" class="form-control" required>
                <small style="color: var(--text-secondary); font-size: 12px;">You'll be notified at this time</small>
            </div>
            
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="closeModal('reminder-modal')">Cancel</button>
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-plus"></i> Add Reminder
                </button>
            </div>
        </form>
    </div>
</div>
